<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | MilAgro CS S.A.S</title>
    
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .auth-container { max-width: 450px; margin: 4rem auto; background: white; padding: 2.5rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); }
        .auth-logo { text-align: center; margin-bottom: 2rem; text-decoration: none; display: block; }
        .auth-logo h1 { font-size: 2rem; }
        .auth-logo .mil { color: var(--amarillo); } .auth-logo .agro { color: var(--verde-oscuro); }

        .tabs { display: flex; border-bottom: 2px solid var(--gris-claro); margin-bottom: 2rem; }
        .tab { flex-grow: 1; text-align: center; padding: 10px; cursor: pointer; font-weight: bold; color: var(--gris-medio); border-bottom: 3px solid transparent; }
        .tab.active { color: var(--verde-oscuro); border-color: var(--verde-oscuro); }

        .form-section { display: none; }
        .form-section.active { display: block; }
    </style>
</head>
<body class="bg-gris-campo">

    <div class="auth-container fade-in">
        <a href="../index.html" class="auth-logo">
            <i class="fa-solid fa-seedling" style="color: var(--verde-oscuro); font-size: 2.5rem;"></i>
            <h1><span class="mil">Mil</span><span class="agro">Agro</span></h1>
        </a>

        <div class="tabs">
            <div class="tab active" onclick="switchForm('login')">Ingresar</div>
            <div class="tab" onclick="switchForm('register')">Crear Cuenta</div>
        </div>

        <!-- FORM LOGIN -->
        <div id="loginFormSec" class="form-section active">
            <h2 class="text-center" style="font-size:1.3rem; margin-bottom:0.5rem;">Bienvenido de nuevo</h2>
            <form onsubmit="window.handleLogin(event)" style="margin-top: 1.5rem;">
                <div class="form-group">
                    <label class="form-label">Número de Cédula</label>
                    <input type="text" id="phoneInput" class="form-control" placeholder="Ingresa tu número de cédula" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <input type="password" id="passInput" class="form-control" placeholder="****" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
            </form>
            
            <div style="margin-top: 2rem; text-align:center; font-size:0.85rem; color: #888;">
                <p>Usa la pestaña de crear cuenta si no estás registrado.</p>
            </div>
        </div>

        <!-- FORM REGISTRO -->
        <div id="registerFormSec" class="form-section fade-in">
            <h2 class="text-center" style="font-size:1.3rem; margin-bottom:0.5rem;">Crear Cuenta Nueva</h2>
            <p class="text-center" style="font-size:0.9rem;">Acumula puntos y haz compras más fácil.</p>
            <form onsubmit="window.handleRegister(event)" style="margin-top: 1.5rem;">
                <div class="form-group">
                    <label class="form-label">Nombre Completo</label>
                    <input type="text" id="regName" class="form-control" placeholder="Carlos Martínez" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Número de Cédula</label>
                    <input type="text" inputmode="numeric" pattern="[0-9]+" id="regCedula" class="form-control" placeholder="Ej: 1002345678" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Número de Celular</label>
                    <input type="text" inputmode="numeric" pattern="[0-9]+" id="regPhone" class="form-control" placeholder="3001234567" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Correo Electrónico (Para facturas)</label>
                    <input type="email" id="regEmail" class="form-control" placeholder="cliente@correo.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Crear Contraseña</label>
                    <input type="password" id="regPass" class="form-control" placeholder="****" required>
                </div>
                <button type="submit" class="btn btn-outline btn-block" style="border-color:var(--verde-oscuro); color:var(--verde-oscuro);">Registrarme</button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/auth.js"></script>
    <script>
        function switchForm(type) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
            
            if(type === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('loginFormSec').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('registerFormSec').classList.add('active');
            }
        }
    </script>
</body>
</html>
