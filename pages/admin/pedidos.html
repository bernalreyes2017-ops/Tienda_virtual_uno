<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos | Admin MilAgro</title>
    
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background-color: var(--gris-claro); display: flex; min-height: 100vh; margin: 0; }
        .admin-sidebar { width: 250px; background-color: var(--verde-oscuro); color: white; padding: var(--sp-xl) var(--sp-md); display: flex; flex-direction: column; position: fixed; height: 100vh; }
        .sidebar-logo { text-align: center; margin-bottom: var(--sp-2xl); display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.5rem; color: white; text-decoration: none; }
        .sidebar-menu a { display: flex; align-items: center; gap: 15px; padding: 12px 20px; color: rgba(255,255,255,0.8); text-decoration: none; border-radius: var(--radius-md); margin-bottom: 5px; transition: all 0.2s; }
        .sidebar-menu a:hover, .sidebar-menu a.active { background-color: var(--verde-medio); color: white; }
        .admin-main { flex-grow: 1; margin-left: 250px; padding: var(--sp-xl); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--sp-lg); background: white; padding: var(--sp-lg); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); }
        
        .pedidos-grid { display: grid; gap: var(--sp-md); }
        .pedido-card { background: white; border-radius: var(--radius-md); padding: var(--sp-lg); box-shadow: var(--shadow-sm); display: flex; align-items: center; justify-content: space-between; }
        
        .status-pill { padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.85rem; }
        .st-pending { background: #fff3cd; color: #856404; }
        .st-prep { background: #cce5ff; color: #004085; }
        .st-sent { background: #d4edda; color: #155724; }
        .st-delivered { background: #e2e3e5; color: #383d41; }
        
        .pedido-info h4 { margin-bottom: 5px; color: var(--verde-oscuro); }
        .pedido-meta { font-size: 0.9rem; color: var(--texto-secundario); }
    </style>
</head>
<body>

    <script src="../../js/auth.js"></script>

    <aside class="admin-sidebar">
        <a href="../../index.html" class="sidebar-logo"><i class="fa-solid fa-seedling"></i><span style="font-weight:bold;">MilAgro</span></a>
        <div class="sidebar-menu">
            <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="pos.html"><i class="fa-solid fa-cash-register"></i> Punto de Venta</a>
            <a href="inventario.html"><i class="fa-solid fa-boxes-stacked"></i> Inventario</a>
            <a href="pedidos.html" class="active"><i class="fa-solid fa-truck-fast"></i> Pedidos Web</a>
            <a href="clientes.html"><i class="fa-solid fa-users"></i> Clientes (CRM)</a>
            <a href="reportes.html"><i class="fa-solid fa-file-invoice-dollar"></i> Reportes</a>
            <a href="configuracion.html"><i class="fa-solid fa-gear"></i> Configuración</a>
        </div>
        <div style="margin-top:auto;">
            <button class="btn btn-outline" onclick="window.handleLogout()" style="width:100%; border-color:white; color:white;"><i class="fa-solid fa-power-off"></i> Cerrar Sesión</button>
        </div>
    </aside>

    <main class="admin-main">
        <header class="admin-header">
            <div>
                <h2 style="margin:0;">Gestión de Pedidos Web</h2>
                <p style="margin:0; color:var(--texto-secundario);">DOMICILIOS Y COMPRAS ONLINE.</p>
            </div>
            <div style="display:flex; gap:10px;">
                <select class="form-control" id="statusFilter" onchange="renderOrders()">
                    <option value="all">Todos los estados</option>
                    <option value="pending">Pendientes</option>
                    <option value="prep">Preparando</option>
                    <option value="sent">Enviados</option>
                </select>
            </div>
        </header>

        <div class="pedidos-grid" id="ordersAdminGrid">
            <!-- JS LOADED -->
        </div>
    </main>

    <script src="../../js/utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderOrders();
        });

        const renderOrders = () => {
            const container = document.getElementById('ordersAdminGrid');
            const ordersDB = JSON.parse(localStorage.getItem('milagro_db_orders')) || [];
            
            const filter = document.getElementById('statusFilter').value;
            // Ordenar por fecha descendente (más recientes primero)
            let displayOrders = ordersDB.sort((a,b) => new Date(b.date) - new Date(a.date));

            if(filter !== 'all') {
                displayOrders = displayOrders.filter(o => o.status === filter);
            }

            if(displayOrders.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:3rem; background:white; border-radius:10px;">No hay pedidos en esta categoría.</div>';
                return;
            }

            let html = '';
            displayOrders.forEach(o => {
                let badgeClass = '';
                let statusText = '';
                let nextAction = '';
                let nextStatus = '';

                if(o.status === 'pending') { badgeClass = 'st-pending'; statusText = 'Pendiente'; nextAction = 'Marcar Preparando'; nextStatus = 'prep'; }
                if(o.status === 'prep') { badgeClass = 'st-prep'; statusText = 'Preparando'; nextAction = 'Despachar a Moto'; nextStatus = 'sent'; }
                if(o.status === 'sent') { badgeClass = 'st-sent'; statusText = 'En Camino (Moto)'; nextAction = 'Marcar Entregado'; nextStatus = 'delivered'; }
                if(o.status === 'delivered') { badgeClass = 'st-delivered'; statusText = 'Entregado'; nextAction = ''; }

                let itemsStr = o.items.map(i => `${i.quantity}x ${i.name}`).join(' | ');

                html += `
                    <div class="pedido-card">
                        <div class="pedido-info" style="flex:1;">
                            <h4>${o.id} <span class="status-pill ${badgeClass}">${statusText} (${o.method.toUpperCase()})</span></h4>
                            <div class="pedido-meta">
                                <strong>Cliente:</strong> ${o.customer} (${o.phone})<br>
                                <strong>Dirección:</strong> ${o.address}<br>
                                <strong>Detalle:</strong> <span style="font-size:0.8rem;">${itemsStr}</span><br>
                                <strong>Monto:</strong> <span style="color:var(--verde-oscuro); font-weight:bold;">${formatCOP(o.total)}</span>
                            </div>
                        </div>
                        <div style="display:flex; flex-direction:column; gap:10px; align-items:flex-end;">
                            ${nextAction ? `<button class="btn btn-primary btn-sm" onclick="changeOrderStatus('${o.id}', '${nextStatus}')">${nextAction}</button>` : ''}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        };

        window.changeOrderStatus = (id, newStatus) => {
            const ordersDB = JSON.parse(localStorage.getItem('milagro_db_orders')) || [];
            const idx = ordersDB.findIndex(o => o.id === id);
            if(idx > -1) {
                ordersDB[idx].status = newStatus;
                localStorage.setItem('milagro_db_orders', JSON.stringify(ordersDB));
                renderOrders();
            }
        };
    </script>
</body>
</html>
