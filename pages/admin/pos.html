<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS | Admin MilAgro</title>
    
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="../../css/admin-mobile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background-color: var(--gris-claro); display: flex; min-height: 100vh; margin: 0; }
        .admin-sidebar { width: 250px; background-color: var(--verde-oscuro); color: white; padding: var(--sp-xl) var(--sp-md); display: flex; flex-direction: column; position: fixed; height: 100vh; }
        .sidebar-logo { text-align: center; margin-bottom: var(--sp-2xl); display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.5rem; color: white; text-decoration: none; }
        .sidebar-menu a { display: flex; align-items: center; gap: 15px; padding: 12px 20px; color: rgba(255,255,255,0.8); text-decoration: none; border-radius: var(--radius-md); margin-bottom: 5px; transition: all 0.2s; }
        .sidebar-menu a:hover, .sidebar-menu a.active { background-color: var(--verde-medio); color: white; }
        .admin-main { flex-grow: 1; margin-left: 250px; padding: var(--sp-lg); display: flex; flex-direction: column; height: 100vh; }

        /* POS Layout */
        .pos-grid {
            display: grid;
            grid-template-columns: 2.5fr 1.5fr;
            gap: var(--sp-lg);
            flex-grow: 1;
            height: calc(100vh - 40px);
        }

        .pos-products {
            background: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .pos-search {
            padding: var(--sp-md);
            border-bottom: 2px solid var(--gris-claro);
            background: var(--blanco-fondo);
        }

        .products-grid-scroll {
            padding: var(--sp-md);
            overflow-y: auto;
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            align-content: start;
        }

        .pos-item-card {
            border: 1px solid var(--gris-claro);
            border-radius: var(--radius-sm);
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pos-item-card:hover { border-color: var(--verde-claro); background: var(--blanco-fondo); }
        .pos-item-img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; margin-bottom: 10px; }
        .pos-item-title { font-size: 0.9rem; font-weight: 700; height: 40px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .pos-item-price { color: var(--verde-oscuro); font-weight: bold; }

        .pos-cart {
            background: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .pos-cart-header {
            background: var(--verde-oscuro);
            color: white;
            padding: 15px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .cart-items-scroll {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .pos-cart-line {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px dashed #eee;
            padding: 10px 0;
        }

        .cart-line-info { flex-grow: 1; }
        .cart-line-title { font-weight: 600; font-size: 0.95rem; }
        .cart-line-meta { color: var(--texto-secundario); font-size: 0.85rem; }
        
        .qty-controls { display: flex; align-items: center; gap: 5px; }
        .qty-controls button { width: 25px; height: 25px; background: var(--gris-claro); border: none; border-radius: 50%; cursor: pointer; }

        .pos-cart-footer {
            background: var(--blanco-fondo);
            padding: 20px;
            border-top: 2px solid var(--gris-claro);
        }

        .totals-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 1.1rem; }
        .total-big { font-size: 1.8rem; font-weight: 800; color: var(--amarillo-calido); text-align: right; margin-bottom: 15px; }
    </style>
</head>
<body>
    <script src="../../js/auth.js"></script>
    <aside class="admin-sidebar" style="z-index:100;" id="adminSidebar">
        <a href="../../index.html" class="sidebar-logo"><i class="fa-solid fa-seedling"></i><span style="font-weight:bold;">MilAgro</span></a>
        <div class="sidebar-menu">
            <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="pos.html" class="active"><i class="fa-solid fa-cash-register"></i> Punto de Venta</a>
            <a href="inventario.html"><i class="fa-solid fa-boxes-stacked"></i> Inventario</a>
            <a href="pedidos.html"><i class="fa-solid fa-truck-fast"></i> Pedidos Web</a>
            <a href="clientes.html"><i class="fa-solid fa-users"></i> Clientes (CRM)</a>
            <a href="reportes.html"><i class="fa-solid fa-file-invoice-dollar"></i> Reportes</a>
            <a href="configuracion.html"><i class="fa-solid fa-gear"></i> Configuración</a>
        </div>
        <div style="margin-top:auto;">
            <button class="btn btn-outline" onclick="window.handleLogout()" style="width:100%; border-color:white; color:white;"><i class="fa-solid fa-power-off"></i> Cerrar Sesión</button>
        </div>
    </aside>

    <main class="admin-main">
        <div class="pos-grid">
            
            <!-- PRODUCTOS -->
            <div class="pos-products">
                <div class="pos-search">
                    <input type="text" id="posSearch" class="form-control" placeholder="Buscar por código de barras o nombre...">
                </div>
                <div class="products-grid-scroll" id="posProductsGrid">
                    <!-- JS fills -->
                </div>
            </div>

            <!-- CARRITO DEL TICKET -->
            <div class="pos-cart">
                <div class="pos-cart-header">
                    Venta Actual <span style="float:right; font-size:0.9rem;" id="ticketNum">#T0452</span>
                </div>
                
                <div class="cart-items-scroll" id="posTicketItems">
                    <!-- JS Fills -->
                </div>

                <div class="pos-cart-footer">
                    <div class="totals-row">
                        <span>Subtotal</span>
                        <span id="posSubtotal">$0</span>
                    </div>
                    <div class="total-big" id="posTotal">$0</div>

                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <button class="btn btn-outline" style="border-color:var(--verde-oscuro); color:var(--verde-oscuro);">💳 Tarjeta</button>
                        <button class="btn btn-primary" onclick="alert('Venta registrada con éxito. Ticket impreso.')">💵 Efectivo</button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="../../js/utils.js"></script>
    <script src="../../js/pos.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = getCurrentUser();
            if(user && user.role === 'cajero') {
                document.querySelectorAll('a[href="inventario.html"], a[href="clientes.html"], a[href="reportes.html"], a[href="configuracion.html"]').forEach(el => el.style.display = 'none');
            }
        });
    </script>
    <script src="../../js/admin-mobile.js"></script>
</body>
</html>
