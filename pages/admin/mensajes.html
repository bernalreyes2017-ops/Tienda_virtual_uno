<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajes | Admin MilAgro</title>
    
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="../../css/admin-mobile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background-color: var(--gris-claro); display: flex; min-height: 100vh; margin: 0; }
        .admin-sidebar { width: 250px; background-color: var(--verde-oscuro); color: white; padding: var(--sp-xl) var(--sp-md); display: flex; flex-direction: column; position: fixed; height: 100vh; }
        .sidebar-logo { text-align: center; margin-bottom: var(--sp-2xl); display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.5rem; color: white; text-decoration: none; }
        .sidebar-menu a { display: flex; align-items: center; gap: 15px; padding: 12px 20px; color: rgba(255,255,255,0.8); text-decoration: none; border-radius: var(--radius-md); margin-bottom: 5px; transition: all 0.2s; }
        .sidebar-menu a:hover, .sidebar-menu a.active { background-color: var(--verde-medio); color: white; }
        .admin-main { flex-grow: 1; margin-left: 250px; padding: var(--sp-xl); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--sp-lg); background: white; padding: var(--sp-lg); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); }

        .msg-grid { display: grid; gap: var(--sp-md); }

        .msg-card {
            background: white;
            border-radius: var(--radius-md);
            padding: var(--sp-lg);
            box-shadow: var(--shadow-sm);
            border-left: 4px solid var(--gris-claro);
            transition: all 0.2s;
        }
        .msg-card.unread {
            border-left-color: var(--amarillo);
            background: #fffef5;
        }
        .msg-card:hover { box-shadow: var(--shadow-md); }

        .msg-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .msg-who { font-weight: 700; color: var(--verde-oscuro); font-size: 1.05rem; }
        .msg-motivo { font-size: 0.8rem; background: var(--gris-claro); padding: 3px 10px; border-radius: 20px; color: var(--texto-secundario); }
        .msg-date { font-size: 0.82rem; color: var(--texto-secundario); }
        .msg-body { color: var(--texto-principal); line-height: 1.5; margin: 8px 0 12px; font-size: 0.95rem; background: var(--blanco-fondo); padding: 10px 14px; border-radius: 8px; }

        .msg-actions { display: flex; gap: 8px; flex-wrap: wrap; }

        .badge-unread {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--amarillo);
            color: #333;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 20px;
            padding: 2px 10px;
            margin-left: 8px;
        }

        .empty-state { text-align: center; padding: 4rem 2rem; background: white; border-radius: var(--radius-md); }
    </style>
</head>
<body>

    <script src="../../js/auth.js"></script>

    <aside class="admin-sidebar">
        <a href="../../index.html" class="sidebar-logo"><i class="fa-solid fa-seedling"></i><span style="font-weight:bold;">MilAgro</span></a>
        <div class="sidebar-menu">
            <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="pos.html"><i class="fa-solid fa-cash-register"></i> Punto de Venta</a>
            <a href="inventario.html"><i class="fa-solid fa-boxes-stacked"></i> Inventario</a>
            <a href="pedidos.html"><i class="fa-solid fa-truck-fast"></i> Pedidos Web</a>
            <a href="clientes.html"><i class="fa-solid fa-users"></i> Clientes (CRM)</a>
            <a href="mensajes.html" class="active"><i class="fa-solid fa-envelope"></i> Mensajes <span class="badge-unread" id="sidebarUnread" style="display:none;">0</span></a>
            <a href="reportes.html"><i class="fa-solid fa-file-invoice-dollar"></i> Reportes</a>
            <a href="configuracion.html"><i class="fa-solid fa-gear"></i> Configuración</a>
        </div>
        <div style="margin-top:auto;">
            <button class="btn btn-outline" onclick="window.handleLogout()" style="width:100%; border-color:white; color:white;"><i class="fa-solid fa-power-off"></i> Cerrar Sesión</button>
        </div>
    </aside>

    <main class="admin-main">
        <header class="admin-header">
            <div>
                <h2 style="margin:0;">Mensajes de Clientes <span id="unreadBadge" style="display:none;" class="badge-unread">0 nuevos</span></h2>
                <p style="margin:0; color:var(--texto-secundario);">Mensajes recibidos desde el formulario de contacto.</p>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-outline btn-sm" onclick="markAllRead()"><i class="fa-solid fa-check-double"></i> Marcar todos leídos</button>
                <button class="btn btn-outline btn-sm" onclick="clearAllMessages()" style="color:var(--error); border-color:var(--error);"><i class="fa-solid fa-trash"></i> Borrar todos</button>
            </div>
        </header>

        <div id="msgGrid" class="msg-grid">
            <!-- JS LOADED -->
        </div>
    </main>

    <script src="../../js/utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderMessages();
        });

        const renderMessages = () => {
            const msgs = JSON.parse(localStorage.getItem('milagro_db_messages')) || [];
            const container = document.getElementById('msgGrid');
            const unreadCount = msgs.filter(m => !m.read).length;

            // Actualizar badge
            const badge = document.getElementById('unreadBadge');
            const sidebarBadge = document.getElementById('sidebarUnread');
            if (unreadCount > 0) {
                badge.textContent = unreadCount + ' nuevos';
                badge.style.display = 'inline-flex';
                sidebarBadge.textContent = unreadCount;
                sidebarBadge.style.display = 'inline-flex';
            } else {
                badge.style.display = 'none';
                sidebarBadge.style.display = 'none';
            }

            if (msgs.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-envelope-open" style="font-size:3rem; color:var(--gris-medio); margin-bottom:1rem;"></i>
                        <h3 style="color:var(--gris-medio);">No hay mensajes aún</h3>
                        <p style="color:var(--texto-secundario);">Los mensajes del formulario de contacto aparecerán aquí.</p>
                    </div>`;
                return;
            }

            // Más recientes primero
            const sorted = [...msgs].sort((a, b) => new Date(b.date) - new Date(a.date));

            container.innerHTML = sorted.map(m => `
                <div class="msg-card ${m.read ? '' : 'unread'}" id="card-${m.id}">
                    <div class="msg-header">
                        <div>
                            <span class="msg-who"><i class="fa-solid fa-user"></i> ${m.name}</span>
                            ${!m.read ? '<span style="font-size:0.75rem; background:var(--amarillo); color:#333; padding:2px 8px; border-radius:10px; margin-left:8px;">Nuevo</span>' : ''}
                        </div>
                        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                            <span class="msg-motivo"><i class="fa-solid fa-tag"></i> ${m.motivo}</span>
                            <span class="msg-date"><i class="fa-regular fa-clock"></i> ${new Date(m.date).toLocaleString('es-CO')}</span>
                        </div>
                    </div>
                    <div style="font-size:0.9rem; color:var(--texto-secundario); margin-bottom:6px;">
                        <i class="fa-solid fa-phone"></i> ${m.phone}
                    </div>
                    <div class="msg-body">${m.mensaje}</div>
                    ${m.attachment ? `
                        <div style="margin-bottom:12px; padding:10px; background:#f9f9f9; border:1px solid #ddd; border-radius:8px;">
                            <p style="margin:0 0 5px 0; font-size:0.85rem; color:var(--texto-secundario);">
                                <i class="fa-solid fa-paperclip"></i> Adjunto: <strong>${m.attachmentName || 'Archivo'}</strong>
                            </p>
                            ${m.attachmentType && m.attachmentType.startsWith('image/') 
                                ? `<img src="${m.attachment}" style="max-width:100%; max-height:200px; border-radius:4px; display:block; margin-top:5px; cursor:pointer; border:1px solid #eee;" onclick="window.open('${m.attachment}')">` 
                                : `<a href="${m.attachment}" download="${m.attachmentName || 'adjunto'}" class="btn btn-outline btn-sm"><i class="fa-solid fa-download"></i> Descargar Archivo</a>`
                            }
                        </div>
                    ` : ''}
                    <div class="msg-actions">
                        <a href="https://wa.me/57${m.phone}?text=${encodeURIComponent('¡Hola ' + m.name + '! 👋\nGracias por contactarnos en MilAgro CS S.A.S.\nEstamos respondiendo a tu mensaje sobre: ' + m.motivo + '\n\n')}" 
                           target="_blank" class="btn btn-primary btn-sm">
                            <i class="fa-brands fa-whatsapp"></i> Responder por WhatsApp
                        </a>
                        ${!m.read ? `<button class="btn btn-outline btn-sm" onclick="markRead('${m.id}')"><i class="fa-solid fa-check"></i> Marcar leído</button>` : ''}
                        <button class="btn btn-outline btn-sm" onclick="deleteMessage('${m.id}')" style="color:var(--error); border-color:var(--error);">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        };

        const markRead = (id) => {
            const msgs = JSON.parse(localStorage.getItem('milagro_db_messages')) || [];
            const idx = msgs.findIndex(m => m.id === id);
            if (idx > -1) {
                msgs[idx].read = true;
                localStorage.setItem('milagro_db_messages', JSON.stringify(msgs));
                renderMessages();
            }
        };

        const markAllRead = () => {
            const msgs = JSON.parse(localStorage.getItem('milagro_db_messages')) || [];
            msgs.forEach(m => m.read = true);
            localStorage.setItem('milagro_db_messages', JSON.stringify(msgs));
            renderMessages();
        };

        const deleteMessage = (id) => {
            if (!confirm('¿Eliminar este mensaje?')) return;
            const msgs = JSON.parse(localStorage.getItem('milagro_db_messages')) || [];
            localStorage.setItem('milagro_db_messages', JSON.stringify(msgs.filter(m => m.id !== id)));
            renderMessages();
        };

        const clearAllMessages = () => {
            if (!confirm('¿Eliminar TODOS los mensajes? Esta acción no se puede deshacer.')) return;
            localStorage.removeItem('milagro_db_messages');
            renderMessages();
        };
    </script>
    <script src="../../js/admin-mobile.js"></script>
</body>
</html>
